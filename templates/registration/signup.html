{% extends 'base.html' %}
{% load i18n %}
{% block title %}{% trans 'Sign up' %}{% endblock %}
{% block content %}
<article class="auth-card">
    <h1>{% trans 'Create an account' %}</h1>
    <form method="post">{% csrf_token %}{{ form.as_p }}<button type="submit">{% trans 'Sign up' %}</button></form>
    <p class="muted">{% trans 'Already registered?' %} <a href="{% url 'login' %}">{% trans 'Log in' %}</a>.</p>
</article>
{% endblock %}
