    labels:
      - "🤖 Dependencies"
      - "🤖 Dependabot"
      - "docker-compose"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    labels:
      - "🤖 Dependencies"
      - "🤖 Dependabot"
      - "github-actions"