version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
    labels:
      - "🤖 Dependencies"
      - "🤖 Dependabot"
      - "python"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
