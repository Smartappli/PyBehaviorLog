[tool.ruff]
target-version = "py313"
line-length = 100
exclude = [
  "migrations",
  "media",
  "staticfiles",
  ".venv",
]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "UP", "RUF", "SIM", "C4"]
ignore = [
  "E501",
  # Django model/form Meta inner classes use mutable class attributes intentionally.
  "RUF012",
  # Existing code patterns intentionally trade strictness for readability in this project.
  "RUF005",
  "RUF010",
  "RUF046",
  "C416",
]

[tool.ruff.format]
quote-style = "single"
indent-style = "space"

[tool.coverage.run]
branch = true
source = ["tracker"]
omit = [
  "*/migrations/*",
  "tracker/admin.py",
]

[tool.coverage.report]
fail_under = 80
show_missing = true
skip_covered = false
